<section id="projetos" class="py-20 w-full relative flex flex-col items-center">
  <h2 class="text-3xl font-bold text-emerald-500 mb-10 text-center font-mono">> PROJETOS_</h2>

  <!-- Container Principal: O px-16 aqui é o que garante o espaço para os cards laterais -->
  <div class="relative flex items-center justify-center w-full max-w-7xl mx-auto px-4">
    
    <!-- Botão Anterior -->
    <button (click)="anterior()" 
            class="p-4 text-emerald-500 hover:text-white transition-colors text-3xl z-10">
      «
    </button>

    <!-- Container do Scroll: A máscara linear suaviza o corte dos cards laterais -->
    <div #container 
         class="flex gap-6 overflow-x-hidden w-full py-8 px-16 scroll-smooth items-center justify-start"
         style="mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); 
                -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);">
      
      <!-- Cards: O 'shrink-0' impede que eles sejam redimensionados -->
      <div *ngFor="let p of projetos" 
           (click)="abrir(p)"
           class="w-[280px] h-[180px] shrink-0 border border-gray-600 bg-zinc-900 p-6 cursor-pointer 
                  flex flex-col justify-center transition-all duration-300 
                  hover:border-emerald-500 hover:scale-105 shadow-lg">
        
        <h3 class="text-white font-bold font-mono">{{ p.nome }}</h3>
        <p class="text-gray-400 text-xs mt-2">{{ p.desc }}</p>
      </div>
    </div>

    <!-- Botão Próximo -->
    <button (click)="proximo()" 
            class="p-4 text-emerald-500 hover:text-white transition-colors text-3xl z-10">
      »
    </button>
  </div>

 
</section>

<app-modal *ngIf="projetoSelecionado" 
           [projeto]="projetoSelecionado" 
           (fechar)="fecharModalPai()">
</app-modal>
