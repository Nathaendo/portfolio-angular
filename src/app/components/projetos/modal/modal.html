@if (projeto) {
<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" 
     (click)="clicarFechar()">

  <div class="bg-zinc-900 border border-emerald-500 p-6 md:p-8 max-w-lg w-full rounded-lg shadow-2xl flex flex-col h-fit max-h-[80vh]" 
       (click)="$event.stopPropagation()">
    
    <h2 class="text-emerald-500 font-mono font-bold text-2xl mb-4 shrink-0">> {{ projeto.nome }}</h2>
    
    <div class="overflow-y-auto pr-2 flex-grow mb-6">
      <p class="text-gray-300 leading-relaxed text-sm md:text-base">
        {{ projeto.detalhe }}
      </p>

      <div class="mt-6 p-4 bg-zinc-800/50 border border-zinc-700 rounded">
        <p class="text-emerald-500 font-mono text-xs mb-2 uppercase">Acesso do projeto:</p>
        <a [href]="projeto.link" target="_blank" rel="noopener noreferrer"
           class="text-blue-400 underline font-mono break-all text-sm">
           {{ projeto.link }}
        </a>
      </div>
    </div>

    <button (click)="clicarFechar()" 
            class="w-full bg-emerald-500 text-black font-bold py-3 hover:bg-emerald-400 transition-colors uppercase font-mono shrink-0">
      Fechar
    </button>
  </div>
</div>
}
